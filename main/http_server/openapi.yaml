openapi: 3.1.0
info:
  title: ESP-Miner API
  description: API specification for ESP-Miner HTTP server
  version: 1.0.0
  license:
    name: GNU General Public License version 3
    url: https://opensource.org/license/gpl-3-0

servers:
  - url: http://{device_ip}
    description: ESP-Miner device
    variables:
      device_ip:
        default: "192.168.1.1"
        description: IP address of the ESP-Miner device

components:
  schemas:
    GenericResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    BridgeInfo:
      type: object
      required:
        - available
        - versionQuerySupported
        - version
        - protocolMajor
        - protocolMinor
      properties:
        available:
          type: boolean
          description: Whether the RP2040 bridge responded to the control UART
        versionQuerySupported:
          type: boolean
          description: Whether the installed bridge implements the version query command
        version:
          anyOf:
            - type: string
            - type: 'null'
          description: Installed bridge version, or null for older/unavailable firmware
        protocolMajor:
          anyOf:
            - type: integer
            - type: 'null'
          description: Bridge control protocol major version
        protocolMinor:
          anyOf:
            - type: integer
            - type: 'null'
          description: Bridge control protocol minor version
    BridgeUpdateStatus:
      type: object
      required:
        - state
        - progress
        - imageSize
        - running
        - versionQuerySupported
        - currentVersion
        - error
      properties:
        state:
          type: string
          enum:
            - idle
            - preparing
            - erasing
            - programming
            - verifying
            - resetting
            - querying
            - complete
            - failed
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: Progress within the current update state
        imageSize:
          type: integer
          minimum: 0
          maximum: 2097152
        running:
          type: boolean
        versionQuerySupported:
          type: boolean
        currentVersion:
          anyOf:
            - type: string
            - type: 'null'
          description: Version reported after reset, when supported
        error:
          anyOf:
            - type: string
            - type: 'null'
          description: ESP-IDF error name when the update failed
    BzmValidationRequest:
      type: object
      additionalProperties: false
      required: [targetStage, hold, leaseSeconds, confirm]
      properties:
        targetStage:
          type: integer
          minimum: 0
          maximum: 7
          description: Highest validation stage to execute.
        hold:
          type: boolean
          description: Keep a successful powered stage active under its lease.
        leaseSeconds:
          type: integer
          minimum: 0
          maximum: 300
          description: Must not exceed configuration.maximumLeaseSeconds.
        confirm:
          type: string
          maxLength: 32
          description: Powered stages require the exact compiled power confirmation.
      example:
        targetStage: 2
        hold: true
        leaseSeconds: 15
        confirm: ENERGIZE_BZM_1002
    BzmValidationHeartbeatRequest:
      type: object
      additionalProperties: false
      required: [leaseSeconds]
      properties:
        leaseSeconds:
          type: integer
          minimum: 1
          maximum: 300
          description: Replacement lease duration, bounded by the compiled maximum.
      example:
        leaseSeconds: 15
    BzmValidationStopRequest:
      type: object
      additionalProperties: false
      properties:
        reason:
          type: string
          maxLength: 96
      example:
        reason: operator completed stage validation
    BzmStageResult:
      type: object
      required: [status, statusName, code, codeName, detail]
      properties:
        status:
          type: integer
          minimum: 0
          maximum: 5
        statusName:
          type: string
          enum: [NOT_RUN, RUNNING, GOOD, BAD, BLOCKED, SKIPPED]
        code:
          type: integer
          minimum: 0
        codeName:
          type: string
        detail:
          type: string
          maxLength: 159
    BzmStageExecution:
      allOf:
        - $ref: '#/components/schemas/BzmStageResult'
        - type: object
          required: [stage, stageName]
          properties:
            stage:
              type: integer
              minimum: 0
              maximum: 7
            stageName:
              type: string
    BzmStageDefinition:
      type: object
      required:
        - stage
        - name
        - configuration
        - expectedGood
        - expectedBad
        - energizesAsicRail
        - requiresLocalArm
      properties:
        stage:
          type: integer
          minimum: 0
          maximum: 7
        name:
          type: string
        configuration:
          type: string
        expectedGood:
          type: string
        expectedBad:
          type: string
        energizesAsicRail:
          type: boolean
        requiresLocalArm:
          type: boolean
    BzmSupervisorConfiguration:
      type: object
      required:
        - buildMaxStage
        - buildMaxStageName
        - implementedMaxStage
        - implementedMaxStageName
        - poweredStagesCompiled
        - productionMode
        - independentKillAvailable
        - allowEspOnlyKillInLab
        - boardManagedSafety
        - maximumLeaseMs
        - maximumLeaseSeconds
        - firstPoweredStage
        - stage7MiningEnabled
        - stage7ProofTimeoutMs
        - stage7MinimumValidResults
        - stage7MappingRecoveryEnabled
        - stage7MaximumMappingRejections
        - stage7MaximumLocalRejections
        - stage7MinimumNonceDifficulty
        - stage7LeadZeros
        - stage7DispatchGapUs
        - stage7ParserRealignEnabled
        - stage7ParserRealignMaxDiscards
        - stage7ParserRealignCleanWindows
        - stage7ParserRealignMaxWindows
        - stage7ParserRealignMaxEvents
        - sensorTdmGapCount
        - pllLockConfirmSamples
        - powerConfirmation
        - armMethod
        - bootButtonRequired
        - localArmWindowMs
      properties:
        buildMaxStage: {type: integer, minimum: 0, maximum: 7}
        buildMaxStageName: {type: string}
        implementedMaxStage: {type: integer, minimum: 0, maximum: 7}
        implementedMaxStageName: {type: string}
        poweredStagesCompiled: {type: boolean}
        productionMode: {type: boolean}
        independentKillAvailable: {type: boolean}
        allowEspOnlyKillInLab: {type: boolean}
        boardManagedSafety: {type: boolean}
        maximumLeaseMs: {type: integer, minimum: 1000, maximum: 300000}
        maximumLeaseSeconds: {type: integer, minimum: 1, maximum: 300}
        firstPoweredStage: {type: integer, const: 2}
        stage7MiningEnabled: {type: boolean}
        stage7ProofTimeoutMs: {type: integer, minimum: 1000, maximum: 300000}
        stage7MinimumValidResults: {type: integer, minimum: 1, maximum: 100}
        stage7MappingRecoveryEnabled: {type: boolean}
        stage7MaximumMappingRejections: {type: integer, minimum: 1, maximum: 100}
        stage7MaximumLocalRejections: {type: integer, minimum: 0, maximum: 100}
        stage7MinimumNonceDifficulty: {type: integer, minimum: 1, maximum: 1024}
        stage7LeadZeros: {type: integer, minimum: 32, maximum: 64}
        stage7DispatchGapUs: {type: integer, minimum: 0, maximum: 2000}
        stage7ParserRealignEnabled: {type: boolean}
        stage7ParserRealignMaxDiscards: {type: integer, minimum: 1, maximum: 256}
        stage7ParserRealignCleanWindows: {type: integer, minimum: 1, maximum: 10}
        stage7ParserRealignMaxWindows: {type: integer, minimum: 2, maximum: 20}
        stage7ParserRealignMaxEvents: {type: integer, minimum: 1, maximum: 20}
        sensorTdmGapCount: {type: integer, minimum: 0, maximum: 63}
        pllLockConfirmSamples: {type: integer, minimum: 1, maximum: 10}
        powerConfirmation: {type: string, const: ENERGIZE_BZM_1002}
        armMethod:
          type: string
          enum: [USB_SERIAL_JTAG, BOOT_BUTTON]
        bootButtonRequired: {type: boolean}
        localArmWindowMs: {type: integer, minimum: 0, maximum: 60000}
    BzmLocalArm:
      type: object
      required: [enabled, method, active, remainingMs, windowMs, singleUse, command]
      properties:
        enabled:
          type: boolean
          description: Whether this lab image accepts a local USB serial arm command.
        method:
          type: string
          enum: [USB_SERIAL_JTAG, BOOT_BUTTON]
        active:
          type: boolean
          description: Whether a non-expired one-shot local arm is waiting.
        remainingMs: {type: integer, minimum: 0, maximum: 60000}
        windowMs: {type: integer, minimum: 0, maximum: 60000}
        singleUse: {type: boolean}
        command:
          type: string
          description: Exact local serial command when enabled; never accepted by HTTP.
    BzmValidationReport:
      type: object
      required:
        - schemaVersion
        - runId
        - requestedStage
        - requestedStageName
        - buildMaxStage
        - buildMaxStageName
        - implementedMaxStage
        - implementedMaxStageName
        - reachedStage
        - reachedStageName
        - overall
        - overallName
        - state
        - stateName
        - energized
        - leaseMs
        - stages
        - finalSafeOff
      properties:
        schemaVersion: {type: integer, minimum: 0}
        runId: {type: integer, minimum: 0}
        requestedStage: {type: integer, minimum: 0, maximum: 7}
        requestedStageName: {type: string}
        buildMaxStage: {type: integer, minimum: 0, maximum: 7}
        buildMaxStageName: {type: string}
        implementedMaxStage: {type: integer, minimum: 0, maximum: 7}
        implementedMaxStageName: {type: string}
        reachedStage: {type: integer, minimum: 0, maximum: 7}
        reachedStageName: {type: string}
        overall: {type: integer, minimum: 0, maximum: 5}
        overallName: {type: string}
        state: {type: integer, minimum: 0, maximum: 5}
        stateName:
          type: string
          enum: [IDLE, EXECUTING, OFF_SAFE, HOLDING, FAULT_LATCHED, SHUTDOWN_UNVERIFIED]
        energized: {type: boolean}
        leaseMs: {type: integer, minimum: 0, maximum: 300000}
        stages:
          type: array
          minItems: 8
          maxItems: 8
          items:
            $ref: '#/components/schemas/BzmStageExecution'
        finalSafeOff:
          $ref: '#/components/schemas/BzmStageResult'
    BzmBridgeValidationSnapshot:
      type: object
      required: [fanRpm, info, safetyStatus]
      properties:
        fanRpm: {type: integer, minimum: 0, maximum: 65535}
        info:
          type: object
          required: [valid, schemaVersion, protocolMajor, protocolMinor, version]
          properties:
            valid: {type: boolean}
            schemaVersion: {type: integer, minimum: 0, maximum: 255}
            protocolMajor: {type: integer, minimum: 0, maximum: 255}
            protocolMinor: {type: integer, minimum: 0, maximum: 255}
            version: {type: string, maxLength: 63}
        safetyStatus:
          type: object
          required:
            - valid
            - snapshotValid
            - payloadValid
            - schemaVersion
            - stage
            - stageName
            - state
            - stateName
            - fault
            - faultName
            - runtimeVerdict
            - runtimeVerdictName
            - productionVerdict
            - productionVerdictName
            - capabilities
            - evidence
            - leaseRemainingMs
            - fiveVoltEnabled
            - asicResetAsserted
            - fanFull
            - fanPercent
            - tripInputAsserted
          properties:
            valid: {type: boolean}
            snapshotValid: {type: boolean}
            payloadValid: {type: boolean}
            schemaVersion: {type: integer, minimum: 0, maximum: 255}
            stage: {type: integer, minimum: 0, maximum: 2}
            stageName: {type: string}
            state: {type: integer, minimum: 0, maximum: 2}
            stateName: {type: string}
            fault: {type: integer, minimum: 0, maximum: 255}
            faultName: {type: string}
            runtimeVerdict: {type: integer, minimum: 0, maximum: 255}
            runtimeVerdictName: {type: string}
            productionVerdict: {type: integer, minimum: 0, maximum: 255}
            productionVerdictName: {type: string}
            capabilities: {type: integer, minimum: 0, maximum: 65535}
            evidence: {type: integer, minimum: 0, maximum: 65535}
            leaseRemainingMs: {type: integer, minimum: 0}
            fiveVoltEnabled: {type: boolean}
            asicResetAsserted: {type: boolean}
            fanFull: {type: boolean}
            fanPercent: {type: integer, minimum: 0, maximum: 100}
            tripInputAsserted: {type: boolean}
    BzmValidationOperation:
      type: object
      required: [type, accepted]
      properties:
        type:
          type: string
          enum: [validation, heartbeat, stop, faultClear]
        accepted: {type: boolean}
        gateResult: {type: integer, minimum: 0, maximum: 9}
        gateResultName: {type: string}
        targetStage: {type: integer, minimum: 0, maximum: 7}
        hold: {type: boolean}
        leaseSeconds: {type: integer, minimum: 0, maximum: 300}
    BzmRuntimeHealth:
      type: object
      required: [valid, status, statusName, fault, faultName, detail, sampledAtMs]
      properties:
        valid:
          type: boolean
          description: Whether at least one runtime-health evaluation has completed.
        status:
          type: integer
          minimum: 0
          maximum: 1
          description: Numeric runtime-health result; 0 is GOOD and 1 is BAD.
        statusName:
          type: string
          enum: [GOOD, BAD, INVALID_STATUS]
        fault:
          type: integer
          minimum: 0
          maximum: 65535
          description: Stable BZM runtime-health fault code.
        faultName:
          type: string
          description: Stable symbolic name for the runtime-health fault code.
        detail:
          type: string
          maxLength: 159
        sampledAtMs:
          type: integer
          minimum: 0
          description: Monotonic milliseconds when this health result was evaluated; zero means no evaluation has completed.
    BzmRunningEvidence:
      type: object
      required:
        - requested
        - monitoring
        - complete
        - startedAtMs
        - elapsedMs
        - status
        - statusName
        - fault
        - faultName
        - detail
        - requiredChipEngineWrites
        - minimumValidResults
        - mappingRecoveryEnabled
        - maximumMappingRejections
        - maximumLocalRejections
        - proofTimeoutMs
        - counters
      properties:
        requested: {type: boolean}
        monitoring: {type: boolean}
        complete: {type: boolean}
        startedAtMs: {type: integer, minimum: 0}
        elapsedMs: {type: integer, minimum: 0}
        status: {type: integer, minimum: 0, maximum: 2}
        statusName:
          type: string
          enum: [PENDING, GOOD, BAD, INVALID]
        fault: {type: integer, minimum: 0, maximum: 6}
        faultName:
          type: string
          enum: [NONE, COUNTER_ROLLBACK, DISPATCH, MAPPING, LOCAL_VALIDATION, TIMEOUT, INVALID_CONFIGURATION, INVALID]
        detail: {type: string, maxLength: 159}
        requiredChipEngineWrites: {type: integer, minimum: 1}
        minimumValidResults: {type: integer, minimum: 1, maximum: 100}
        mappingRecoveryEnabled: {type: boolean}
        maximumMappingRejections: {type: integer, minimum: 1, maximum: 100}
        maximumLocalRejections: {type: integer, minimum: 0, maximum: 100}
        proofTimeoutMs: {type: integer, minimum: 1000, maximum: 300000}
        counters:
          type: object
          required:
            - dispatchBatches
            - dispatchedLogicalEngines
            - dispatchedChipEngines
            - dispatchFailures
            - mappedResults
            - mappingRejections
            - mappingRejectionStreak
            - mappingRecoveryPending
            - locallyValidResults
            - locallyRejectedResults
            - localRejectionStreak
            - localRecoveryPending
          properties:
            dispatchBatches: {type: integer, minimum: 0}
            dispatchedLogicalEngines: {type: integer, minimum: 0}
            dispatchedChipEngines: {type: integer, minimum: 0}
            dispatchFailures: {type: integer, minimum: 0}
            mappedResults: {type: integer, minimum: 0}
            mappingRejections: {type: integer, minimum: 0}
            mappingRejectionStreak: {type: integer, minimum: 0}
            mappingRecoveryPending: {type: boolean}
            locallyValidResults: {type: integer, minimum: 0}
            locallyRejectedResults: {type: integer, minimum: 0}
            localRejectionStreak: {type: integer, minimum: 0}
            localRecoveryPending: {type: boolean}
    BzmValidationSnapshot:
      type: object
      required:
        - available
        - runtime
        - configuration
        - localArm
        - lease
        - fault
        - health
        - runningEvidence
        - bridge
        - report
        - stageDefinitions
      properties:
        available: {type: boolean}
        runtime:
          type: object
          required:
            - active
            - initialized
            - monitorRunning
            - dispatchAllowed
            - stage7Complete
            - lastGateResult
            - lastGateResultName
            - owner
            - ownerName
          properties:
            active: {type: boolean}
            initialized: {type: boolean}
            monitorRunning: {type: boolean}
            dispatchAllowed: {type: boolean}
            stage7Complete: {type: boolean}
            lastGateResult: {type: integer, minimum: 0, maximum: 9}
            lastGateResultName: {type: string}
            owner: {type: integer, minimum: 0, maximum: 5}
            ownerName: {type: string}
        configuration:
          $ref: '#/components/schemas/BzmSupervisorConfiguration'
        localArm:
          $ref: '#/components/schemas/BzmLocalArm'
        lease:
          type: object
          required: [active, expired, deadlineMs, remainingMs, requestedMs, maximumMs]
          properties:
            active: {type: boolean}
            expired: {type: boolean}
            deadlineMs: {type: integer, minimum: 0}
            remainingMs: {type: integer, minimum: 0}
            requestedMs: {type: integer, minimum: 0, maximum: 300000}
            maximumMs: {type: integer, minimum: 0, maximum: 300000}
        fault:
          type: object
          required: [latched, code, detail]
          properties:
            latched: {type: boolean}
            code: {type: integer, minimum: 0}
            detail: {type: string, maxLength: 159}
        health:
          $ref: '#/components/schemas/BzmRuntimeHealth'
        runningEvidence:
          $ref: '#/components/schemas/BzmRunningEvidence'
        bridge:
          $ref: '#/components/schemas/BzmBridgeValidationSnapshot'
        report:
          $ref: '#/components/schemas/BzmValidationReport'
        stageDefinitions:
          type: array
          minItems: 8
          maxItems: 8
          items:
            $ref: '#/components/schemas/BzmStageDefinition'
        operation:
          $ref: '#/components/schemas/BzmValidationOperation'
        error: {type: string}
        message: {type: string}
    UpdateSettingsResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        redirect:
          type: object
          properties:
            url:
              type: string
            delay:
              type: number
            message:
              type: string
    SharesRejectedReason:
      type: object
      required:
        - message
        - count
      properties:
        message:
          type: string
          description: Rejection reason from pool
          examples:
            - "Job not found"
        count:
          type: integer
          description: Shares rejected for this reason
    WifiNetwork:
      type: object
      required:
        - ssid
        - rssi
        - authmode
      properties:
        ssid:
          type: string
          description: Network SSID
          examples:
            - "MyWiFiNetwork"
        rssi:
          type: integer
          description: Signal strength in dBm
          examples:
            - -65
        authmode:
          type: integer
          minimum: 0
          maximum: 12
          enum:
            - 0  # WIFI_AUTH_OPEN
            - 1  # WIFI_AUTH_WEP
            - 2  # WIFI_AUTH_WPA_PSK
            - 3  # WIFI_AUTH_WPA2_PSK
            - 4  # WIFI_AUTH_WPA_WPA2_PSK
            - 5  # WIFI_AUTH_WPA2_ENTERPRISE
            - 6  # WIFI_AUTH_WPA3_PSK
            - 7  # WIFI_AUTH_WPA2_WPA3_PSK
            - 8  # WIFI_AUTH_WAPI_PSK
            - 9  # WIFI_AUTH_OWE
            - 10 # WIFI_AUTH_WPA3_ENT_192
            - 11 # WIFI_AUTH_WPA3_PSK_192 (deprecated)
            - 12 # WIFI_AUTH_WPA3_EXT_PSK (deprecated)
          description: |
            Authentication mode:
            * 0 - OPEN
            * 1 - WEP
            * 2 - WPA_PSK
            * 3 - WPA2_PSK
            * 4 - WPA_WPA2_PSK
            * 5 - WPA2_ENTERPRISE
            * 6 - WPA3_PSK
            * 7 - WPA2_WPA3_PSK
            * 8 - WAPI_PSK
            * 9 - OWE (Opportunistic Wireless Encryption)
            * 10 - WPA3_ENT_192 (Enterprise Suite-B)
            * 11 - WPA3_PSK_192 (deprecated, use WPA3_PSK)
            * 12 - WPA3_EXT_PSK (deprecated, use WPA3_PSK)
          examples:
            - 3
    HashrateMonitorAsic:
      type: object
      required:
        - total
        - domains
        - errorCount
      properties:
        total:
          type: number
          description: Hashrate
        domains:
          type: array
          description: Hashrate per domain
          items:
            type: number
        errorCount:
          description: Number of errors
          type: number

    SystemInfo:
      type: object
      required:
        - ASICModel
        - apEnabled
        - autofanspeed
        - bestDiff
        - bestSessionDiff
        - boardVersion
        - coreVoltage
        - coreVoltageActual
        - current
        - display
        - fallbackStratumExtranonceSubscribe
        - fallbackStratumPort
        - fallbackStratumSuggestedDifficulty
        - fallbackStratumURL
        - fallbackStratumUser
        - fallbackStratumTLS
        - fallbackStratumCert
        - fallbackStratumDecodeCoinbase
        - fanrpm
        - fan2rpm
        - fanspeed
        - temptarget
        - rotation
        - cpuUsage
        - freeHeap
        - freeHeapInternal
        - freeHeapSpiram
        - minFreeHeap
        - maxAllocHeap
        - frequency
        - actualFrequency
        - hashRate
        - hashRate_1m
        - hashRate_10m
        - hashRate_1h
        - expectedHashrate
        - errorPercentage
        - hostname
        - idfVersion
        - invertscreen
        - isPSRAMAvailable
        - isUsingFallbackStratum
        - macAddr
        - manualFanSpeed
        - maxPower
        - minFanSpeed
        - nominalVoltage
        - overheat_mode
        - overclockEnabled
        - poolConnectionInfo
        - poolDifficulty
        - power
        - resetReason
        - responseTime
        - runningPartition
        - sharesAccepted
        - sharesRejected
        - sharesRejectedReasons
        - smallCoreCount
        - ssid
        - ipv4
        - ipv6
        - stratumExtranonceSubscribe
        - stratumPort
        - stratumProtocol
        - stratumV2AuthorityPubkey
        - stratumSuggestedDifficulty
        - stratumURL
        - stratumUser
        - stratumTLS
        - stratumCert
        - stratumDecodeCoinbase
        - temp
        - temp2
        - uptimeSeconds
        - version
        - axeOSVersion
        - voltage
        - vrTemp
        - wifiStatus
        - wifiRSSI
        - displayTimeout
        - statsFrequency
        - blockHeight
        - scriptsig
        - networkDifficulty
        - blockSignals
        - blockFound
        - coinbaseOutputs
        - coinbaseValueTotalSatoshis
        - coinbaseValueUserSatoshis
        - hashrateMonitor
        - miningPaused
        - statsLimit
      properties:
        ASICModel:
          type: string
          description: ASIC model identifier
        apEnabled:
          type: number
          description: Whether AP mode is enabled (0=no, 1=yes)
        autofanspeed:
          type: number
          description: Automatic fan speed control (0=manual, 1=auto)
        bestDiff:
          type: number
          description: Best difficulty achieved
        bestSessionDiff:
          type: number
          description: Best difficulty achieved in current session
        boardVersion:
          type: string
          description: Hardware board version
        coreVoltage:
          type: number
          description: Configured ASIC core voltage
        coreVoltageActual:
          type: number
          description: Actual measured ASIC core voltage
        current:
          type: number
          description: Current draw in milliamps
        display:
          type: string
          description: The configured display
        fallbackStratumExtranonceSubscribe:
          type: boolean
          description: Enable fallback pool extranonce subscription
        fallbackStratumPort:
          type: number
          description: Fallback stratum server port
        fallbackStratumSuggestedDifficulty:
          type: number
          description: Fallback pool suggested difficulty
        fallbackStratumURL:
          type: string
          description: Fallback stratum server URL
        fallbackStratumUser:
          type: string
          description: Fallback stratum username
        fallbackStratumTLS:
          type: boolean
          description: Enable fallback stratum TLS
        fallbackStratumCert:
          type: string
          description: Fallback stratum TLS cert
        fallbackStratumDecodeCoinbase:
          type: boolean
          description: Enable fallback pool coinbase transaction decoding
        fallbackStratumProtocol:
          type: string
          enum: [SV1, SV2]
          description: Configured fallback stratum protocol
        fallbackStratumV2AuthorityPubkey:
          type: string
          description: Fallback SV2 authority public key for certificate verification (base58-encoded)
        fallbackStratumV2ChannelType:
          type: string
          enum: [standard, extended]
          description: Configured fallback SV2 channel type
        fanrpm:
          type: number
          description: Current fan speed in RPM
        fan2rpm:
          type: number
          description: Current secondary fan speed in RPM
        fanspeed:
          type: number
          description: Current fan speed percentage
        temptarget:
          type: number
          description: Target Temperature for the PID Controller
        responseTime:
          type: number
          description: Pool response time in ms
        responseShareBatch:
          type: number
          description: Number of shares acknowledged in the batch that produced responseTime (SV2; 1 = single share, >1 = batched ack)
        rotation:
          type: number
          description: Screen rotation setting (0, 90, 180, 270)
        cpuUsage:
          type: number
          description: CPU usage percentage
        freeHeap:
          type: number
          description: Available heap memory in bytes
        freeHeapInternal:
          type: number
          description: Available internal heap memory in bytes
        freeHeapSpiram:
          type: number
          description: Available Spiram heap memory in bytes
        minFreeHeap:
          type: number
          description: All-time low watermark for free heap memory in bytes
        maxAllocHeap:
          type: number
          description: Largest contiguous free block of internal heap memory in bytes
        frequency:
          type: number
          description: ASIC frequency in MHz
        actualFrequency:
          type: number
          description: Real-time ASIC frequency in MHz
        hashRate:
          type: number
          description: Current hashrate in Gh/s
        hashRate_1m:
          type: number
          description: Current hashrate 1m average
        hashRate_10m:
          type: number
          description: Current hashrate 10m average
        hashRate_1h:
          type: number
          description: Current hashrate 1h average
        expectedHashrate:
          type: number
          description: Expected hashrate at current voltage/frequency settings, in Gh/s
        errorPercentage:
          type: number
          description: Hash error percentage
        hostname:
          type: string
          description: Device hostname
        fullHostname:
          type: string
          description: Full hostname including .local domain for mDNS
        mdnsHostname:
          type: string
          description: mDNS/Bonjour hostname for network discovery
        idfVersion:
          type: string
          description: ESP-IDF version
        invertscreen:
          type: number
          description: Screen invert setting (0=normal, 1=inverted)
        isPSRAMAvailable:
          type: number
          description: Whether PSRAM is available (0=no, 1=yes)
        isUsingFallbackStratum:
          type: number
          description: Whether using fallback stratum (0=no, 1=yes)
        macAddr:
          type: string
          description: Device MAC address
        manualFanSpeed:
          type: integer
          description: Fan speed when auto fan speed is disabled
        maxPower:
          type: integer
          description: Maxmium power draw of the board in watts
        minFanSpeed:
          type: integer
          description: Minimum fan speed percentage when using auto fan control
        nominalVoltage:
          type: integer
          description: Nominal board voltage
        overheat_mode:
          type: number
          description: Overheat protection mode
        overclockEnabled:
          type: integer
          description: Set custom voltage/frequency in AxeOS
        poolConnectionInfo:
          type: string
          description: Current pool address family
        poolDifficulty:
          type: number
          description: Current pool difficulty
        power:
          type: number
          description: Power consumption in watts
        power_fault:
          type: string
          description: Voltage regulator fault reason, if any
        hardware_fault:
          type: string
          description: Hardware/Peripheral fault reason, if any
        resetReason:
          type: string
          description: Reason for the last system reset
        runningPartition:
          type: string
          description: Currently active OTA partition
        sharesAccepted:
          type: number
          description: Number of accepted shares
        sharesRejected:
          type: number
          description: Number of rejected shares
        sharesRejectedReasons:
          type: array
          description: Reason(s) shares were rejected
          items:
            $ref: '#/components/schemas/SharesRejectedReason'
        smallCoreCount:
          type: number
          description: Number of small cores
        ssid:
          type: string
          description: Connected WiFi network SSID
        ipv4:
          type: string
          description: IPv4 address
        ipv6:
          type: string
          description: IPv6 address
        stratumExtranonceSubscribe:
          type: boolean
          description: Enable pool extranonce subscription
        stratumPort:
          type: number
          description: Primary stratum server port
        stratumProtocol:
          type: string
          enum: [SV1, SV2]
          description: Configured stratum protocol
        stratumV2AuthorityPubkey:
          type: string
          description: SV2 authority public key for certificate verification (base58-encoded)
        stratumV2ChannelType:
          type: string
          enum: [standard, extended]
          description: Configured SV2 channel type
        stratumSuggestedDifficulty:
          type: number
          description: Pool suggested difficulty
        stratumURL:
          type: string
          description: Primary stratum server URL
        stratumUser:
          type: string
          description: Primary stratum username
        stratumTLS:
          type: boolean
          description: Enable primary pool TLS
        stratumCert:
          type: string
          description: Primary stratum TLS cert
        stratumDecodeCoinbase:
          type: boolean
          description: Enable primary pool coinbase transaction decoding
        temp:
          type: number
          description: Average chip temperature
        temp2:
          type: number
          description: Average chip temperature from second sensor
        uptimeSeconds:
          type: number
          description: System uptime in seconds
        version:
          type: string
          description: Firmware version
        axeOSVersion:
          type: string
          description: AxeOS version
        voltage:
          type: number
          description: Input voltage
        vrTemp:
          type: number
          description: Voltage regulator temperature
        wifiStatus:
          type: string
          description: WiFi connection status
        wifiRSSI:
          type: number
          description: WiFi signal strength
        displayTimeout:
          type: number
          description: Turn off display after timeout
        statsFrequency:
          type: number
          description: Statistics frequency in seconds
        blockHeight:
          type: integer
          description: Current block height
        scriptsig:
          type: string
          description: Scriptsig extracted from coinbase transaction
        networkDifficulty:
          type: number
          description: Current network difficulty
        blockSignals:
          type: array
          description: Active block signaling (e.g., BIP-110)
          items:
            type: string
        blockFound:
          type: number
          description: Number of blocks found
        showNewBlock:
          type: boolean
          description: Whether to show the block found notification
        coinbaseOutputs:
          type: array
          description: Coinbase transaction outputs
          items:
            type: object
            title: coinbaseOutput
            required:
              - value
              - address
            properties:
              value:
                type: integer
                description: Output value in satoshis
              address:
                type: string
                description: Output address
        coinbaseValueTotalSatoshis:
          type: integer
          description: Total value of coinbase transaction in satoshis
        coinbaseValueUserSatoshis:
          type: integer
          description: User's portion of coinbase value in satoshis
        hashrateMonitor:
          type: object
          required:
            - asics
          properties:
            asics:
              type: array
              description: Hashrate register value per ASIC
              items:
                $ref: '#/components/schemas/HashrateMonitorAsic'
        miningPaused:
          type: boolean
          description: Whether mining is currently paused
        statsLimit:
          type: integer
          description: Maximum number of statistics data points

    SystemASIC:
      type: object
      required:
        - ASICModel
        - swarmColor
        - asicCount
        - deviceModel
        - defaultFrequency
        - frequencyOptions
        - frequencyTunable
        - defaultVoltage
        - voltageOptions
        - voltageTunable
      properties:
        ASICModel:
          type: string
          description: ASIC model identifier
          enum:
            - BM1366
            - BM1368
            - BM1370
            - BM1397
            - BZM
          examples:
            - "BM1366"
        deviceModel:
          type: string
          description: Device model name
          examples:
            - "Ultra"
        swarmColor:
          type: string
          description: Swarm color
          examples:
            - "purple"
        asicCount:
          type: number
          description: Number of ASICs detected
        defaultFrequency:
          type: number
          description: Default frequency for the ASIC model in MHz
          examples:
            - 450
        frequencyOptions:
          type: array
          description: Available frequency options for the ASIC model in MHz
          items:
            type: number
          examples:
            - [400, 425, 450, 475, 485, 500, 525, 550, 575]
        frequencyTunable:
          type: boolean
          description: Whether the hardware supports changing the ASIC clock
        defaultVoltage:
          type: number
          description: Default voltage for the ASIC model in millivolts
          examples:
            - 1100
        voltageOptions:
          type: array
          description: Available voltage options for the ASIC model in millivolts
          items:
            type: number
          examples:
            - [1100, 1150, 1200, 1250, 1300]
        voltageTunable:
          type: boolean
          description: Whether the hardware supports changing the ASIC supply voltage

    SystemStatistics:
      type: object
      required:
        - currentTimestamp
        - labels
        - statistics
      properties:
        currentTimestamp:
          type: number
          description: Current timestamp as a reference
        labels:
          type: array
          description: Labels for statistics data value index
          items:
            type: string
        statistics:
          type: array
          description: Statistics data point(s)
          items:
            type: array
            description: Statistics data values(s)
            items:
              type: number

    SystemScoreboardEntry:
      type: object
      required:
        - difficulty
        - job_id
        - extranonce2
        - ntime
        - nonce
        - version_bits
      properties:
        rank:
          type: number
          description: Rank of the share in the scoreboard
        since:
          type: number
          description: Time since share found in seconds
        difficulty:
          type: number
          description: Difficulty of the share
        job_id:
          type: string
          description: Job ID of the share
        extranonce2:
          type: string
          description: Extranonce2 of the share
        ntime:
          type: number
          description: Ntime of the share
        nonce:
          type: string
          description: Nonce of the share
        version_bits:
          type: string
          description: Version bits of the share

    Settings:
      type: object
      properties:
        useFallbackStratum:
          type: number
          description: Forces the use the fallback stratum pool
        stratumURL:
          type: string
          description: Primary stratum server URL
          examples:
            - "stratum+tcp://pool.example.com"
        fallbackStratumURL:
          type: string
          description: Fallback stratum server URL used when primary is unavailable
          examples:
            - "stratum+tcp://backup.example.com"
        stratumUser:
          type: string
          description: Username for primary stratum server
          examples:
            - "worker1"
        stratumPassword:
          type: string
          description: Password for primary stratum server
          writeOnly: true
          examples:
            - "x"
        fallbackStratumUser:
          type: string
          description: Username for fallback stratum server
          examples:
            - "worker1"
        fallbackStratumPassword:
          type: string
          description: Password for fallback stratum server
          writeOnly: true
          examples:
            - "x"
        stratumPort:
          type: integer
          description: Port number for primary stratum server
          minimum: 1
          maximum: 65535
          examples:
            - 3333
        stratumProtocol:
          type: string
          description: Stratum protocol
          enum: [SV1, SV2]
          examples:
            - "SV1"
        stratumV2ChannelType:
          type: string
          description: SV2 channel type
          enum: [standard, extended]
          examples:
            - "standard"
        stratumV2AuthorityPubkey:
          type: string
          description: Optional SV2 authority public key for certificate verification (base58-encoded)
          pattern: "^[123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz]*$"
          maxLength: 52
          examples:
            - ""
            - "9auqWEzQDVyd2oe1JVGFLMLHZtCo2FFqZwtKA5gd9xbuEu7PH72"
        fallbackStratumPort:
          type: integer
          description: Port number for fallback stratum server
          minimum: 1
          maximum: 65535
          examples:
            - 3333
        fallbackStratumProtocol:
          type: string
          description: Fallback stratum protocol
          enum: [SV1, SV2]
          examples:
            - "SV1"
        fallbackStratumV2ChannelType:
          type: string
          description: Fallback SV2 channel type
          enum: [standard, extended]
          examples:
            - "standard"
        fallbackStratumV2AuthorityPubkey:
          type: string
          description: Optional fallback SV2 authority public key for certificate verification (base58-encoded)
          pattern: "^[123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz]*$"
          maxLength: 52
          examples:
            - ""
        ssid:
          type: string
          description: WiFi network SSID
          minLength: 1
          maxLength: 32
          examples:
            - "MyWiFiNetwork"
        wifiPass:
          type: string
          description: WiFi network password
          writeOnly: true
          minLength: 8
          maxLength: 63
          examples:
            - "MySecurePassword123"
        hostname:
          type: string
          description: Device hostname
          pattern: "^[a-zA-Z0-9-]+$"
          examples:
            - "esp-miner-1"
        coreVoltage:
          type: integer
          description: ASIC core voltage in millivolts
          minimum: 1
          examples:
            - 850
        frequency:
          type: integer
          description: ASIC frequency in MHz
          minimum: 1
          examples:
            - 450
        rotation:
          type: integer
          description: Whether to rotate the screen orientation (0, 90, 180, 270 degrees)
          enum: [0, 1]
          examples:
            - 0
        overheat_mode:
          type: integer
          description: Overheat protection mode (0=disabled)
          enum: [0]
          examples:
            - 0
        overclockEnabled:
          type: integer
          description: Set custom voltage/frequency in AxeOS (0=disabled, 1=enabled)
          enum: [0,1]
          examples:
            - 0
        invertscreen:
          type: integer
          description: Whether to invert screen colors (0=normal, 1=inverted)
          enum: [0, 1]
          examples:
            - 0
        autofanspeed:
          type: integer
          description: Whether to enable automatic fan speed control (0=manual, 1=auto)
          enum: [0, 1]
          examples:
            - 1
        fanspeed:
          type: integer
          description: Manual fan speed percentage when autofanspeed is disabled
          minimum: 0
          maximum: 100
          examples:
            - 80
        temptarget:
          type: integer
          description: Manual Temperature Target in °C when autofanspeed is enabled
          minimum: 0
          maximum: 100
          examples:
            - 66
        displayTimeout:
          type: integer
          description: Set display timeout time in minutes (-1=display on, 0=display off)
          minimum: -1
          maximum: 71582
          examples:
            - 10
        statsFrequency:
          type: integer
          description: Set statistics frequency in seconds (0=disabled)
          minimum: 0
          examples:
            - 120
      additionalProperties: true

  responses:
    UnauthorizedError:
      description: Unauthorized - Client not in allowed network range

    InternalError:
      description: Internal server error

paths:
  /api/system/wifi/scan:
    get:
      summary: Scan for available WiFi networks
      description: Returns a list of available WiFi networks in range
      operationId: scanWifiNetworks
      tags:
        - wifi
      responses:
        '200':
          description: Successful scan
          content:
            application/json:
              schema:
                title: SystemWifiScan
                type: object
                required:
                  - networks
                properties:
                  networks:
                    type: array
                    items:
                      $ref: '#/components/schemas/WifiNetwork'
        '401':
          description: Unauthorized - Client not in allowed network range
        '500':
          description: Internal server error

  /api/system/info:
    get:
      summary: Get system information
      description: Returns current system status and information
      operationId: getSystemInfo
      tags:
        - system
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemInfo'
        '401':
          description: Unauthorized - Client not in allowed network range
        '500':
          description: Internal server error

  /api/system/logs:
    get:
      summary: Download system logs
      description: Returns the current system logs as a text file
      operationId: downloadSystemLogs
      tags:
        - system
      responses:
        '200':
          description: Successful operation
          content:
            text/plain:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized - Client not in allowed network range
        '500':
          description: Internal server error

  /api/system/asic:
    get:
      summary: Get ASIC settings information
      description: Returns current ASIC model and corresponding available frequency and voltage options
      operationId: getAsicSettings
      tags:
        - system
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemASIC'
        '401':
          description: Unauthorized - Client not in allowed network range
        '500':
          description: Internal server error

  /api/system/statistics:
    get:
      summary: Get system statistics
      description: Returns system statistics
      operationId: getSystemStatistics
      parameters:
        - in: query
          name: columns
          required: false
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
            example: [hashrate,hashrate_1m,hashrate_10m,hashrate_1h,asicTemp,vrTemp,asicVoltage,voltage,power,current,fanSpeed,fanRpm,fan2Rpm,wifiRssi,freeHeap,responseTime]
          description: List of labels for which data should be retrieved
      tags:
        - system
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatistics'
        '401':
          description: Unauthorized - Client not in allowed network range
        '500':
          description: Internal server error

  /api/system/scoreboard:
    get:
      summary: Get best difficulty share scoreboard
      description: Returns top 20 best difficulty shares
      operationId: getSystemScoreboard
      tags:
        - system
      responses:
        '200':      
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SystemScoreboardEntry'

  /api/system/pause:
    post:
      summary: Pause mining
      description: Pauses mining activity
      operationId: pauseMining
      tags:
        - system
      responses:
        '200':
          description: Mining paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '401':
          description: Unauthorized - Client not in allowed network range
        '500':
          description: Internal server error

  /api/system/resume:
    post:
      summary: Resume mining
      description: Resumes mining activity
      operationId: resumeMining
      tags:
        - system
      responses:
        '200':
          description: Mining resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '401':
          description: Unauthorized - Client not in allowed network range
        '500':
          description: Internal server error

  /api/system/restart:
    post:
      summary: Restart the system
      description: Triggers a system restart
      operationId: restartSystem
      tags:
        - system
      responses:
        '200':
          description: System restart initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '401':
          description: Unauthorized - Client not in allowed network range
        '500':
          description: Internal server error

  /api/system/identify:
    post:
      summary: Identify the device
      description: Let the device say Hi!
      operationId: identifySystem
      tags:
        - system
      responses:
        '200':
          description: Device identify initiated
          content:
            application/json:
              schema:
                '$ref': '#/components/schemas/GenericResponse'
        '401':
          description: Unauthorized - Client not in allowed network range
        '500':
          description: Internal server error

  /api/system/blockFound/dismiss:
    post:
      summary: Dismiss block found notification
      description: Dismisses the block found notification while preserving the count
      operationId: dismissBlockFound
      tags:
        - system
      responses:
        '200':
          description: Block found notification dismissed
          content:
            application/json:
              schema:
                type: object
                properties:
                  blockFound:
                    type: number
                    description: Number of blocks found
                  showNewBlock:
                    type: boolean
                    description: Whether to show the block found notification
                  message:
                    type: string
        '401':
          description: Unauthorized - Client not in allowed network range
        '500':
          description: Internal server error

  /api/system:
    patch:
      summary: Update system settings
      description: Updates system configuration settings
      operationId: updateSystemSettings
      tags:
        - system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Settings'
      responses:
        '200':
          description: Settings updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateSettingsResponse'
        '400':
          description: Invalid settings provided
        '401':
          description: Unauthorized - Client not in allowed network range
        '500':
          description: Internal server error

  /api/system/OTA:
    post:
      summary: Update system firmware
      description: Upload and apply new firmware via OTA update
      operationId: updateFirmware
      tags:
        - system
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Firmware update successful
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: Invalid firmware file
        '401':
          description: Unauthorized - Client not in allowed network range
        '500':
          description: Internal server error

  /api/system/OTAWWW:
    post:
      summary: Update web interface
      description: Upload and apply new web interface files
      operationId: updateWebInterface
      tags:
        - system
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Web interface update successful
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: Invalid web interface file
        '401':
          description: Unauthorized - Client not in allowed network range
        '500':
          description: Internal server error

  /api/system/bridge:
    get:
      summary: Query Bonanza bridge information
      description: >-
        Queries the RP2040 bridge over its control UART. This route is
        registered only when the configured board uses a BZM ASIC and the
        Bonanza bridge; it remains available when the bridge is unresponsive
        so recovery is possible.
      operationId: getBridgeInfo
      tags:
        - system
      responses:
        '200':
          description: Bridge information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgeInfo'
        '401':
          description: Unauthorized - Client not in allowed network range

  /api/system/bridge/firmware:
    post:
      summary: Update Bonanza bridge firmware
      description: >-
        Stages a separately supplied raw RP2040 .bin in ESP32 PSRAM and starts
        an asynchronous SWD update. ESP-Miner contains only the small SRAM
        flash helper and never bundles a bridge firmware image. This route is
        registered only for configured BZM bridge products.
      operationId: updateBridgeFirmware
      tags:
        - system
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '202':
          description: Bridge update accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgeUpdateStatus'
        '400':
          description: Invalid RP2040 raw firmware image
        '401':
          description: Unauthorized - Client not in allowed network range
        '409':
          description: A bridge upload or update is already in progress
        '503':
          description: PSRAM is unavailable for image staging

  /api/system/bridge/firmware/status:
    get:
      summary: Get Bonanza bridge update status
      description: Returns the current asynchronous SWD update state.
      operationId: getBridgeFirmwareUpdateStatus
      tags:
        - system
      responses:
        '200':
          description: Bridge update status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BridgeUpdateStatus'
        '401':
          description: Unauthorized - Client not in allowed network range

  /api/system/bzm/validation:
    get:
      summary: Get Bonanza staged-validation state
      description: >-
        Returns the complete runtime, supervisor configuration, lease, fault,
        last runtime-health evaluation, bridge evidence, validation report,
        and definitions for stages 0 through 7. Registered only on configured
        Bonanza bridge boards.
      operationId: getBzmValidation
      tags: [system]
      responses:
        '200':
          description: Current Bonanza validation snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BzmValidationSnapshot'
              example:
                available: true
                runtime:
                  active: true
                  initialized: true
                  monitorRunning: true
                  dispatchAllowed: false
                  stage7Complete: false
                  lastGateResult: 0
                  lastGateResultName: ACCEPTED
                  owner: 0
                  ownerName: NONE
                configuration:
                  buildMaxStage: 0
                  buildMaxStageName: OFF_SAFE
                  implementedMaxStage: 7
                  implementedMaxStageName: RUNNING
                  poweredStagesCompiled: false
                  productionMode: true
                  independentKillAvailable: false
                  allowEspOnlyKillInLab: false
                  boardManagedSafety: false
                  maximumLeaseMs: 30000
                  maximumLeaseSeconds: 30
                  firstPoweredStage: 2
                  stage7MiningEnabled: false
                  stage7ProofTimeoutMs: 15000
                  stage7MinimumValidResults: 1
                  stage7MappingRecoveryEnabled: false
                  stage7MaximumMappingRejections: 2
                  stage7MaximumLocalRejections: 1
                  stage7MinimumNonceDifficulty: 1
                  stage7LeadZeros: 36
                  stage7DispatchGapUs: 0
                  stage7ParserRealignEnabled: false
                  stage7ParserRealignMaxDiscards: 32
                  stage7ParserRealignCleanWindows: 2
                  stage7ParserRealignMaxWindows: 6
                  stage7ParserRealignMaxEvents: 2
                  sensorTdmGapCount: 0
                  pllLockConfirmSamples: 1
                  powerConfirmation: ENERGIZE_BZM_1002
                  armMethod: BOOT_BUTTON
                  bootButtonRequired: true
                  localArmWindowMs: 0
                localArm:
                  enabled: false
                  method: BOOT_BUTTON
                  active: false
                  remainingMs: 0
                  windowMs: 0
                  singleUse: false
                  command: ''
                lease:
                  active: false
