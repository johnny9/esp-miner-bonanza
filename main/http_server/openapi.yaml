    post:
      summary: Execute a Bonanza validation target
      description: >-
        Executes synchronously through targetStage. Powered targets also
        require the configured local arm, the exact confirm string, and a
        bounded lease. Lab images may consume a one-shot arm issued through
        the local USB Serial/JTAG console; other images sample BOOT. HTTP 200
        means admission succeeded; the returned report still determines
        whether hardware was GOOD, BAD, or BLOCKED.
      operationId: runBzmValidation
      tags: [system]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BzmValidationRequest'
            example:
              targetStage: 2
              hold: true
              leaseSeconds: 15
              confirm: ENERGIZE_BZM_1002
      responses:
        '200':
          description: Request admitted; inspect report.overall and report.stages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BzmValidationSnapshot'
        '400': {description: JSON shape, type, or bound is invalid}
        '401': {description: Unauthorized - Client not in allowed network range}
        '408': {description: Complete request body was not received before the receive timeout}
        '409': {description: Runtime is busy or a fault is latched}
        '412': {description: A compiled, local-arm, confirmation, or lease precondition failed}
        '413': {description: Request body exceeds 384 bytes}
        '415': {description: Content-Type is not application/json}
        '503': {description: Bonanza validation runtime is unavailable}

  /api/system/bzm/validation/heartbeat:
    post:
      summary: Renew a held Bonanza validation lease
      operationId: heartbeatBzmValidation
      tags: [system]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BzmValidationHeartbeatRequest'
            example: {leaseSeconds: 15}
      responses:
        '200':
          description: Lease renewed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BzmValidationSnapshot'
        '400': {description: JSON shape, type, or bound is invalid}
        '401': {description: Unauthorized - Client not in allowed network range}
        '408': {description: Complete request body was not received before the receive timeout}
        '409': {description: No live validation/mining hold can be renewed}
        '413': {description: Request body exceeds 384 bytes}
        '415': {description: Content-Type is not application/json}
        '503': {description: Bonanza validation runtime is unavailable}

  /api/system/bzm/validation/stop:
    post:
      summary: Stop validation and prove Bonanza safe-off
      description: >-
        Forces safe-off and returns its proof. An empty body is accepted; a
        supplied body must be an exact JSON object with only optional reason.
        Exclusive updater, factory, or restart maintenance cannot be revoked
        by this generic stop operation.
      operationId: stopBzmValidation
      tags: [system]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BzmValidationStopRequest'
            example: {reason: operator completed stage validation}
      responses:
        '200':
          description: Safe-off completed and verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BzmValidationSnapshot'
        '400': {description: JSON shape, type, or bound is invalid}
        '401': {description: Unauthorized - Client not in allowed network range}
        '408': {description: Complete request body was not received before the receive timeout}
        '409': {description: Exclusive updater, factory, or restart maintenance owns the safe-off boundary}
        '413': {description: Request body exceeds 384 bytes}
        '415': {description: Content-Type is not application/json}
        '500': {description: Safe-off could not be verified; fault details are returned}
        '503': {description: Bonanza validation runtime is unavailable}

  /api/system/bzm/fault/clear:
    post:
      summary: Re-prove safe-off and clear a Bonanza fault latch
      description: >-
        Accepts no body or an empty JSON object. Clearing succeeds only after
        ESP and bridge safe-off evidence is freshly re-proved.
      operationId: clearBzmValidationFault
      tags: [system]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              maxProperties: 0
            example: {}
      responses:
        '200':
          description: Fault latch cleared after safe-off proof
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BzmValidationSnapshot'
        '400': {description: Request body is not an empty JSON object}
        '401': {description: Unauthorized - Client not in allowed network range}
        '408': {description: Complete request body was not received before the receive timeout}
        '409': {description: No fault is latched or safe-off could not be re-proved}
        '413': {description: Request body exceeds 384 bytes}
        '415': {description: Content-Type is not application/json}
        '503': {description: Bonanza validation runtime is unavailable}
